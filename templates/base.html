<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{% block title %}Notturnometer{% endblock %}</title>
<link rel="stylesheet" href="/static/style.css">
<link rel="stylesheet" href="/pagefind/pagefind-ui.css">
<link rel="alternate" type="application/atom+xml" title="Notturnometer — last nights" href="/feed.xml">
</head>
<body>
<header>
<nav>
<a href="/">Home</a>
<a href="{{ url_for('browse', '') }}">Browse</a>
<a href="/about/">About</a>
</nav>
<div id="search"></div>
</header>
{% block content %}{% endblock %}
<footer>
<p>Programme data from BBC Radio 3's <em>Through the Night</em>. All programme
links go to bbc.co.uk.</p>
{% if built_at %}<p>Built {{ built_at }}.</p>{% endif %}
</footer>
<script src="/pagefind/pagefind-ui.js" onerror="document.getElementById('search').style.display='none';"></script>
<script>
(function () {
  var searchEl = document.getElementById("search");
  if (searchEl && window.PagefindUI) {
    new PagefindUI({
      element: "#search",
      showSubResults: true,
      pageSize: 10,
      translations: {
        placeholder: "Search works, composers, performers…",
      },
    });
  }
})();
</script>
</body>
</html>
