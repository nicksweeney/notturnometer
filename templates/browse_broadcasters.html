{% extends "base.html" %}
{% block title %}Broadcasters — Notturnometer{% endblock %}
{% block content %}
<main data-pagefind-body data-pagefind-filter="type:browse">
<h1>Broadcasters</h1>
<table>
<thead><tr><th>Broadcaster</th><th>Airings</th><th>Performances</th></tr></thead>
<tbody>
{% for b in rows %}
<tr>
<td>{{ b.display_name }}{% if b.flag %} <abbr class="tip flag" tabindex="0" data-tip="{{ b.country }}">{{ b.flag }}</abbr>{% endif %}</td>
<td>{{ b.airings }}</td>
<td>{{ b.recordings }}</td>
</tr>
{% endfor %}
</tbody>
</table>
</main>
{% endblock %}
