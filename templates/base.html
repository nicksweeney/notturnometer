<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{% block title %}Notturnometer{% endblock %}</title>
<link rel="stylesheet" href="/static/style.css{% if style_version %}?v={{ style_version }}{% endif %}">
<link rel="stylesheet" href="/pagefind/pagefind-ui.css">
<link rel="alternate" type="application/atom+xml" title="Notturnometer — last nights" href="/feed.xml">
</head>
<body>
<header>
<a class="wordmark" href="/">Notturnometer</a>
<div id="search"></div>
<nav>
<a href="{{ url_for('browse', '') }}">Browse</a>
<a href="/about/">About</a>
</nav>
</header>
{% block content %}{% endblock %}
<footer>
	<p>Programme data from BBC Radio 3's <em><a href="https://www.bbc.co.uk/programmes/b006tmq9">Through the Night</a></em>. All programme links go to <a href="https://www.bbc.co.uk/">bbc.co.uk</a>. A <a href="http://permanent.red">permanent.red</a> production.</p>
{% if built_at %}<p>Built {{ built_at }}.</p>{% endif %}
</footer>
<script src="/pagefind/pagefind-ui.js" onerror="document.getElementById('search').style.display='none';"></script>
<script>
(function () {
  var searchEl = document.getElementById("search");
  if (searchEl && window.PagefindUI) {
    new PagefindUI({
      element: "#search",
      showSubResults: true,
      pageSize: 10,
      translations: {
        placeholder: "Search for works, composers, performers…",
      },
    });
  }
})();
</script>
</body>
</html>
